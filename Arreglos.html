<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>Páginas Estáticas y Dinámicas</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: rgba(18, 18, 18, 1);
            color: white;
        }

        footer img {
            height: 15px;
            width: 20px;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">Programación Web</span>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">

        <section class="mb-5">

            <h2 class="mb-3">Carrusel de Música</h2>

            <h3 id="Carrusel" class="mb-3"></h3>

            <div class="d-flex gap-2 mb-4">
                <button id="Back" class="btn btn-secondary">Atrás</button>
                <button id="Next" class="btn btn-success">Adelante</button>
            </div>

            <button id="Delete" class="btn btn-danger mb-4">Eliminar</button>

            <div class="d-flex flex-column gap-2 w-50">

                <input id="Artist" class="form-control" placeholder="Artista">

                <input id="Song" class="form-control" placeholder="Canción">

                <input id="Year" class="form-control" placeholder="Año">

                <div class="d-flex gap-2">
                    <button id="Edit" class="btn btn-warning">Editar</button>
                    <button id="Add" class="btn btn-primary">Añadir</button>
                    <button id="Search" class="btn btn-success">Buscar</button>
                </div>

            </div>

            <p id="Results" class="mt-3"></p>

        </section>

    </main>

    <footer class="mt-auto align-items-center py-3 bg-dark">
        <div class="col-md-4 d-flex align-items-center">
            <a href="/" class="mb-3 me-2 mb-md-0 lh-1">
                <img src="./Lynx.svg" alt="Logo">
            </a>
            <span class="mb-3 mb-md-0">© 2026 Kyan Camacho</span>
        </div>
    </footer>

</body>

<script>
    const Carrusel = document.getElementById("Carrusel");

    const Artist = document.getElementById("Artist");
    const Song = document.getElementById("Song");
    const Year = document.getElementById("Year");

    const Back = document.getElementById("Back");
    const Next = document.getElementById("Next");
    const Edit = document.getElementById("Edit");
    const Add = document.getElementById("Add");
    const Search = document.getElementById("Search");
    const Results = document.getElementById("Results");
    const Delete = document.getElementById("Delete");


    var List = [{
            artist: "Tally Hall",
            song: "Hidden in the Sand",
            year: 2005
        },
        {
            artist: "Tally Hall",
            song: "Ruler of Everything",
            year: 2005
        },
        {
            artist: "Tally Hall",
            song: "Banana Man",
            year: 2005
        },
        {
            artist: "Tally Hall",
            song: "Turn the Lights Off",
            year: 2011
        },
        {
            artist: "Tally Hall",
            song: "Good Day",
            year: 2005
        },
        {
            artist: "Miracle Musical",
            song: "Dream Sweet in Sea Major",
            year: 2012
        },
        {
            artist: "Miracle Musical",
            song: "The Mind Electric",
            year: 2012
        },
        {
            artist: "Joe Hawley",
            song: "Rotary Park",
            year: 2016
        },
        {
            artist: "Joe Hawley",
            song: "Black People White People",
            year: 2016
        },
        {
            artist: "Rob Cantor",
            song: "Shia LaBeouf Live",
            year: 2014
        }
    ];

    var Index = 0;

    Show();


    Back.addEventListener("click", () => {
        Move(-1);
    });

    Next.addEventListener("click", () => {
        Move(1);
    });


    Edit.addEventListener("click", () => {
        if (
            Artist.value == "" ||
            Song.value == "" ||
            Year.value == ""
        ) {
            return;
        }

        List[Index] = {
            artist: Artist.value,
            song: Song.value,
            year: Year.value
        };

        Show();
        Clear();
    });


    Add.addEventListener("click", () => {
        if (
            Artist.value == "" ||
            Song.value == "" ||
            Year.value == ""
        ) {
            return;
        }

        List.splice(Index + 1, 0, {

            artist: Artist.value,
            song: Song.value,
            year: Year.value
        });

        Move(1);
        Clear();
    });


    Search.addEventListener("click", () => {
        var res = -1;

        if (Artist.value != "") {
            res = List.findIndex(i =>
                i.artist
                .toLowerCase()
                .includes(
                    Artist.value.toLowerCase()
                )
            );
        }

        if (res == -1 && Song.value != "") {
            res = List.findIndex(i =>
                i.song
                .toLowerCase()
                .includes(
                    Song.value.toLowerCase()
                )
            );
        }

        if (res == -1 && Year.value != "") {
            res = List.findIndex(i =>
                i.year.toString()
                .includes(Year.value)
            );
        }

        if (
            Artist.value == "" &&
            Song.value == "" &&
            Year.value == ""
        ) {
            Results.innerText = "";

            List.forEach((i, index) => {

                Results.innerText +=
                    `
            ${index}

            Artista: ${i.artist}
            Canción: ${i.song}
            Año: ${i.year}

            `;

            });

            return;

        }

        if (res == -1) {
            Results.innerText = "No encontrado";
            return;
        }

        Index = res;

        Results.innerText =

            `
    Encontrado en posición ${res}

    Artista: ${List[res].artist}
    Canción: ${List[res].song}
    Año: ${List[res].year}
    `;

        Show();

    });
    Delete.addEventListener("click", () => {
        if (List.length == 1) {
            Results.innerText = "No puedes eliminar el último elemento";
            return;
        }
        List.splice(Index, 1);
        Move(-1);

    });


    function Move(Num) {
        Index += Num;

        if (Index == -1) {
            Index = List.length - 1;
        } else if (Index == List.length) {
            Index = 0;
        }
        Show();

    }


    function Show() {
        Carrusel.innerText =
            `
    ${Index}:
    Artista: ${List[Index].artist}
    Canción: ${List[Index].song}
    Año: ${List[Index].year}
    `;

    }

    function Clear() {
        Artist.value = "";
        Song.value = "";
        Year.value = "";
    }
</script>

</html>
