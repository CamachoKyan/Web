  <style>
    body {
      background-color: rgba(18, 18, 18, 1);
      color: white;
    }

    footer img {
      height: 15px;

    }

    .ID1{

    }
    .ID3{
        width: 174px;
        height: 174px;
        background-image: url(https://www.shutterstock.com/image-vector/white-dice-graphic-icons-set-600nw-2466053671.jpg);
        background-position: 179px -6px;
        background-color: aqua;
        border-radius: 26px;
        /* border-radius: 30px; */
    }
    .ID4{
        width: 174px;
        height: 174px;
        background-image: url(https://www.shutterstock.com/image-vector/white-dice-graphic-icons-set-600nw-2466053671.jpg);

    .ID5{
        width: 174px;

    }

        width: 174px;

        background-color: aqua;
        border-radius: 26px;

    }

<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">Programación Web</span>
    </div>
  </nav>

  <main class="container my-5 flex-grow-1">

    <section class="mb-5">
      <h2>Lanzador de Dados</h2>
      <h4>Se indicará cuando salgan ambos dados iguales</h4>
      <div class="mb-1 d-flex">
  <div class="col-md-1 dice1 "></div>

  <div class="col-md-1 dice2 "></div>
</div>
      
  <div id="ans"></div>
      <button class="btn btn-success">Tirar dados</button>
  </section>

  </main>

  <footer class="mt-auto align-items-center py-3 bg-dark">
    <div class="col-md-4 d-flex align-items-center">
      <a href="/" class="mb-3 me-2 mb-md-0 lh-1">
        <img src="./Lynx.svg" alt="Logo">
      </a>
      <span class="mb-3 mb-md-0">© 2026 Kyan Camacho</span>
    </div>
  </footer>

  <script>
    
    var count = 0
    const buttons = document.querySelector("button")

    const ans = document.getElementById("ans")

    const dice1 = document.querySelector(".dice1"); 

    const dice2 = document.querySelector(".dice2");

    function rolldice(){
        let ans = Math.floor(Math.random()*6)+1;
        return ans
    }

    document.querySelector("button").addEventListener("click", () => {
        count= count+1;
        let d1= rolldice()
        let d2= rolldice()
        dice1.className = "col-md-4 dice1 ID" + d1
        dice2.className = "col-md-4 dice2 ID" + d2

        if (d1 == d2){
            ans.innerText = `Dados iguales al intento: `+count
    }})

  </script>

</body>
